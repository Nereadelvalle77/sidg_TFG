services:
  web:
    image: nginx
    container_name: app
    user: 1000:1000
    volumes:
     - ./nginx/templates:/etc/nginx/templates
     - ./nginx/html:/usr/share/nginx/html

    ports:
       - "8080:80"
    environment:
      - NGINX_PORT=80

  db:
    image: postgres
    container_name: app-db
    restart: always
    shm_size: 128mb
    user: 1000:1000

    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: app
    volumes:
      - ./postgres-db:/var/lib/postgresql
    ports:
      - "5432:5432"
